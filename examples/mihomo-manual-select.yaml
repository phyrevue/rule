proxy-providers:
  &airport_provider Airport_01:
    type: http
    interval: 1800
    path: ./proxy-providers/Airport_01.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🟢 直连
    url: "https://sub.xxxxxxxx.xyz/xxxxxxxxxxxxx/download/all?target=ClashMeta"

# 用于下载订阅时指定 UA
global-ua: clash

# 全局配置
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true
geodata-mode: false

# GEO 文件加载模式
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 48
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"

# 控制面板
external-controller: 0.0.0.0:9090
secret: ""
external-ui: ui
external-ui-url: "https://ghp.ci/https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

# 匹配进程 always/strict/off
find-process-mode: strict
keep-alive-idle: 600
keep-alive-interval: 30

# 策略组选择和 fake-ip 缓存
profile:
  store-selected: true
  store-fake-ip: true

# 流量嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "+.apple.com"

# 代理模式
tun:
  enable: true
  stack: mixed
  mtu: 9000
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# DNS 模块
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - geosite:private
    - geosite:cn
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    "geosite:private,cn":
      - 223.5.5.5
      - 119.29.29.29
    "geosite:geolocation-!cn":
      - https://dns.cloudflare.com/dns-query
      - https://dns.google/dns-query

proxies:
  - name: "🟢 直连"
    type: direct
    udp: true

# 策略组
# 仅保留新规则对应的大类；每个分流组都显式引用 Airport_01，方便直接手动选择具体节点。
# 如果要改机场 provider 名称，只需要改上面的 `&airport_provider Airport_01:` 这一行。
proxy-groups:
  - name: 🚀 节点选择
    type: select
    use: [*airport_provider]
    proxies: [🟢 直连]

  - name: 🤖 海外AI
    type: select
    use: [*airport_provider]
    proxies: [🚀 节点选择, 🟢 直连]

  - name: 📹 YouTube
    type: select
    use: [*airport_provider]
    proxies: [🚀 节点选择, 🟢 直连]

  - name: 🍀 Google
    type: select
    use: [*airport_provider]
    proxies: [🚀 节点选择, 🟢 直连]

  - name: 🐬 OneDrive
    type: select
    use: [*airport_provider]
    proxies: [🚀 节点选择, 🟢 直连]

  - name: 📲 Telegram
    type: select
    use: [*airport_provider]
    proxies: [🚀 节点选择, 🟢 直连]

  - name: 🎯 全球直连
    type: select
    use: [*airport_provider]
    proxies: [🟢 直连, 🚀 节点选择]

  - name: 🐟 漏网之鱼
    type: select
    use: [*airport_provider]
    proxies: [🚀 节点选择, 🟢 直连]

rules:
  # phyrevue/rule 新规则，顺序不要随意调整。
  - RULE-SET,OverseasAI,🤖 海外AI
  - RULE-SET,YouTube,📹 YouTube
  - RULE-SET,Google,🍀 Google
  - RULE-SET,OneDrive,🐬 OneDrive
  - RULE-SET,Telegram,📲 Telegram
  - RULE-SET,Direct,🎯 全球直连
  - GEOIP,CN,🎯 全球直连,no-resolve
  - MATCH,🐟 漏网之鱼

rule-anchor:
  class: &class
    type: http
    interval: 86400
    behavior: classical
    format: text
    proxy: 🚀 节点选择

rule-providers:
  OverseasAI:
    <<: *class
    url: "https://raw.githubusercontent.com/phyrevue/rule/main/rule/Clash/OverseasAI/OverseasAI.list"
    path: ./rule-providers/OverseasAI.list
  YouTube:
    <<: *class
    url: "https://raw.githubusercontent.com/phyrevue/rule/main/rule/Clash/YouTube/YouTube.list"
    path: ./rule-providers/YouTube.list
  Google:
    <<: *class
    url: "https://raw.githubusercontent.com/phyrevue/rule/main/rule/Clash/Google/Google.list"
    path: ./rule-providers/Google.list
  OneDrive:
    <<: *class
    url: "https://raw.githubusercontent.com/phyrevue/rule/main/rule/Clash/OneDrive/OneDrive.list"
    path: ./rule-providers/OneDrive.list
  Telegram:
    <<: *class
    url: "https://raw.githubusercontent.com/phyrevue/rule/main/rule/Clash/Telegram/Telegram.list"
    path: ./rule-providers/Telegram.list
  Direct:
    <<: *class
    url: "https://raw.githubusercontent.com/phyrevue/rule/main/rule/Clash/Direct/Direct.list"
    path: ./rule-providers/Direct.list
