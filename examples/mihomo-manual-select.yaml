proxy-providers:
  Airport_01:
    type: http
    interval: 1800
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🟢 直连
    url: "https://sub.xxxxxxxx.xyz/xxxxxxxxxxxxx/download/all?target=ClashMeta"

# 用于下载订阅时指定 UA
global-ua: clash

# 全局配置
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true
geodata-mode: false

# GEO 文件加载模式
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 48
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"

# 控制面板
external-controller: 0.0.0.0:9090
secret: ""
external-ui: ui
external-ui-url: "https://ghp.ci/https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

# 匹配进程 always/strict/off
find-process-mode: strict
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 30

# 策略组选择和 fake-ip 缓存
profile:
  store-selected: true
  store-fake-ip: true

# 流量嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "+.apple.com"

# 代理模式
tun:
  enable: true
  stack: mixed
  mtu: 9000
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# DNS 模块
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - geosite:private
    - geosite:cn
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    "rule-set:private_domain,cn_domain":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:geolocation-!cn":
      - https://dns.cloudflare.com/dns-query
      - https://dns.google/dns-query

proxies:
  - name: "🟢 直连"
    type: direct
    udp: true

# 策略组
# 仅保留手动选择组。
# 每个业务分流组都开启 include-all，可直接手动选择机场里的具体节点。
proxy-groups:
  - name: 🚀 节点选择
    type: select
    include-all: true
    proxies:
      - 🌐 全部节点
      - 🟢 直连

  - name: 🤖 海外AI
    type: select
    include-all: true
    proxies: [🚀 节点选择, 🌐 全部节点, 🟢 直连]

  - name: 📹 YouTube
    type: select
    include-all: true
    proxies: [🚀 节点选择, 🌐 全部节点, 🟢 直连]

  - name: 🍀 Google
    type: select
    include-all: true
    proxies: [🚀 节点选择, 🌐 全部节点, 🟢 直连]

  - name: 👨🏿‍💻 GitHub
    type: select
    include-all: true
    proxies: [🚀 节点选择, 🌐 全部节点, 🟢 直连]

  - name: 🐬 OneDrive
    type: select
    include-all: true
    proxies: [🚀 节点选择, 🌐 全部节点, 🟢 直连]

  - name: 🪟 Microsoft
    type: select
    include-all: true
    proxies: [🚀 节点选择, 🌐 全部节点, 🟢 直连]

  - name: 🎵 TikTok
    type: select
    include-all: true
    proxies: [🚀 节点选择, 🌐 全部节点, 🟢 直连]

  - name: 📲 Telegram
    type: select
    include-all: true
    proxies: [🚀 节点选择, 🌐 全部节点, 🟢 直连]

  - name: 🎥 NETFLIX
    type: select
    include-all: true
    proxies: [🚀 节点选择, 🌐 全部节点, 🟢 直连]

  - name: ✈️ Speedtest
    type: select
    include-all: true
    proxies: [🚀 节点选择, 🌐 全部节点, 🟢 直连]

  - name: 💶 PayPal
    type: select
    include-all: true
    proxies: [🚀 节点选择, 🌐 全部节点, 🟢 直连]

  - name: 🍎 Apple
    type: select
    include-all: true
    proxies: [🟢 直连, 🚀 节点选择, 🌐 全部节点]

  - name: 🎯 全球直连
    type: select
    include-all: true
    proxies: [🟢 直连, 🚀 节点选择, 🌐 全部节点]

  - name: 🐟 漏网之鱼
    type: select
    include-all: true
    proxies: [🚀 节点选择, 🌐 全部节点, 🟢 直连]

  - name: 🌐 全部节点
    type: select
    include-all: true

rules:
  - RULE-SET,private_domain,🟢 直连
  - RULE-SET,apple_domain,🍎 Apple

  # PayPal 独立策略组放在 OverseasAI 前面，避免被 OverseasAI 中的支付相关规则先命中。
  # 如果你希望 PayPal 跟随海外 AI，把这一行移动到 OverseasAI 后面即可。
  - RULE-SET,paypal_domain,💶 PayPal

  # phyrevue/rule 新规则，顺序不要随意调整。
  - RULE-SET,OverseasAI,🤖 海外AI
  - RULE-SET,YouTube,📹 YouTube
  - RULE-SET,Google,🍀 Google
  - RULE-SET,OneDrive,🐬 OneDrive
  - RULE-SET,Telegram,📲 Telegram

  # 其它常用分流保留 MetaCubeX geosite/geoip。
  - RULE-SET,github_domain,👨🏿‍💻 GitHub
  - RULE-SET,microsoft_domain,🪟 Microsoft
  - RULE-SET,tiktok_domain,🎵 TikTok
  - RULE-SET,speedtest_domain,✈️ Speedtest
  - RULE-SET,netflix_domain,🎥 NETFLIX

  # phyrevue/rule Direct：局域网、常见直连、国内域名补充。
  - RULE-SET,Direct,🎯 全球直连

  - RULE-SET,proxylite,🚀 节点选择
  - RULE-SET,geolocation-!cn,🚀 节点选择
  - RULE-SET,cn_domain,🎯 全球直连
  - RULE-SET,google_ip,🍀 Google,no-resolve
  - RULE-SET,netflix_ip,🎥 NETFLIX,no-resolve
  - RULE-SET,telegram_ip,📲 Telegram,no-resolve
  - RULE-SET,cn_ip,🎯 全球直连,no-resolve
  - MATCH,🐟 漏网之鱼

rule-anchor:
  ip: &ip
    type: http
    interval: 86400
    behavior: ipcidr
    format: mrs
  domain: &domain
    type: http
    interval: 86400
    behavior: domain
    format: mrs
  text-domain: &text-domain
    type: http
    interval: 86400
    behavior: domain
    format: text
  class: &class
    type: http
    interval: 86400
    behavior: classical
    format: text

rule-providers:
  private_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
  apple_domain:
