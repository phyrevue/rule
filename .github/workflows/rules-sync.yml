name: Sync rules

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python3 -m pip install --upgrade pip && python3 -m pip install -r requirements.txt
      - name: Fetch upstreams
        run: |
          git clone --depth 1 https://github.com/blackmatrix7/ios_rule_script.git /tmp/ios_rule_script
          git clone --depth 1 https://github.com/viewer12/OverseasAI.list.git /tmp/OverseasAI.list
      - name: Sync rules
        run: python3 scripts/sync_rules.py --ios-upstream /tmp/ios_rule_script --ai-upstream /tmp/OverseasAI.list
      - name: Audit upstream coverage
        run: python3 scripts/audit_upstream.py --ios-upstream /tmp/ios_rule_script
      - name: Check OverseasAI domains
        run: python3 scripts/check_domains.py --category OverseasAI
      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            DATE=$(date -u +%Y-%m-%d)
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Update rules ${DATE}"
            git push
          else
            echo "No changes to commit."
          fi
